<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0052CC"/>

  <!-- Jira board columns -->
  <rect x="12" y="70" width="30" height="46" rx="4" fill="#0747A6" opacity="0.5"/>
  <rect x="49" y="70" width="30" height="46" rx="4" fill="#0747A6" opacity="0.5"/>
  <rect x="86" y="70" width="30" height="46" rx="4" fill="#0747A6" opacity="0.5"/>

  <!-- Column headers -->
  <rect x="15" y="73" width="24" height="4" rx="2" fill="#B3D4FF" opacity="0.6"/>
  <rect x="52" y="73" width="24" height="4" rx="2" fill="#B3D4FF" opacity="0.6"/>
  <rect x="89" y="73" width="24" height="4" rx="2" fill="#B3D4FF" opacity="0.6"/>

  <!-- Cards on board -->
  <rect x="15" y="81" width="24" height="10" rx="2" fill="#DEEBFF"/>
  <rect x="15" y="94" width="24" height="10" rx="2" fill="#DEEBFF"/>
  <rect x="52" y="81" width="24" height="10" rx="2" fill="#DEEBFF"/>
  <rect x="89" y="81" width="24" height="10" rx="2" fill="#79F2C0"/>
  <rect x="89" y="94" width="24" height="10" rx="2" fill="#79F2C0"/>

  <!-- Kiro ghost body -->
  <path d="M64 12C48 12 38 24 38 38v20c0 2 1 3 3 3h6c0 4-3 8-3 8s5-2 8-2 5 2 8 2c3 0 5-2 8-2s8 2 8 2-3-4-3-8h6c2 0 3-1 3-3V38c0-14-10-26-26-26z" fill="white"/>

  <!-- Ghost eyes -->
  <circle cx="54" cy="36" r="4" fill="#0052CC"/>
  <circle cx="74" cy="36" r="4" fill="#0052CC"/>

  <!-- Ghost eye shine -->
  <circle cx="52.5" cy="34.5" r="1.5" fill="white"/>
  <circle cx="72.5" cy="34.5" r="1.5" fill="white"/>

  <!-- Ghost smile -->
  <path d="M57 44c0 0 3 4 7 4s7-4 7-4" stroke="#0052CC" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Ghost wavy bottom tentacles -->
  <path d="M41 58c0 4-2 7-4 9 3 0 6-1 8-3 2 3 5 5 8 5s6-2 8-5c2 3 5 5 8 5s6-2 8-5c2 2 5 3 8 3-2-2-4-5-4-9" fill="white" opacity="0.9"/>
